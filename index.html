<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>META‑Index – U/Q/T/H/B</title>

<style>
body { font-family: Arial; background:#0b0b0b; color:#e6e6e6; padding:20px; }
h1 { color:#4cc3ff; }
h2 { color:#6cf; margin-top:30px; }
a { color:#4cc3ff; text-decoration:none; }
a:hover { text-decoration:underline; }
ul { list-style:none; padding:0; }
li { padding:4px 0; border-bottom:1px solid #333; }
</style>
</head>

<body>
<h1>META‑Index – ACTIVE AUTO 3.0 TRUE FULL</h1>
<p>Scan: U → Q → T → H → B (X/Y ignoriert)</p>

<script>
const folders = ["U", "Q", "T", "H", "B"];
const metaRooms = [
  "METAh.room",
  "METAb.room",
  "METAt.room",
  "META360.room",
  "META2.html",
  "META3.html"
];

async function scanFolder(folder) {
  try {
    const res = await fetch(folder + "/");
    if (!res.ok) return;

    const html = await res.text();
    const parser = new DOMParser();
    const doc = parser.parseFromString(html, "text/html");
    const links = [...doc.querySelectorAll("a")];

    const section = document.createElement("div");
    section.innerHTML = `<h2>${folder}</h2><ul></ul>`;
    const ul = section.querySelector("ul");

    links.forEach(link => {
      const name = link.textContent.trim();
      if (name !== "../") {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${folder}/${link.getAttribute("href")}">${name}</a>`;
        ul.appendChild(li);
      }
    });

    document.body.appendChild(section);
  } catch (e) {}
}

async function scanMeta() {
  const section = document.createElement("div");
  section.innerHTML = `<h2>META‑Räume</h2><ul></ul>`;
  const ul = section.querySelector("ul");

  metaRooms.forEach(async room => {
    try {
      const res = await fetch(room);
      if (res.ok) {
        const li = document.createElement("li");
        li.innerHTML = `<a href="${room}">${room}</a>`;
        ul.appendChild(li);
      }
    } catch (e) {}
  });

  document.body.appendChild(section);
}

folders.forEach(scanFolder);
scanMeta();
</script>

</body>
</html>
